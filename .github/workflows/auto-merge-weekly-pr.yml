name: Auto-merge weekly PR only

# 週次ルール PR（rules/weekly-*）のみ: CI 通過後に承認なしでマージ。
# WEEKLY_MERGE_PAT（リポジトリオーナーの PAT）で --admin マージする。
# 通常 PR はセルフレビュー後に手動マージ。

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]

jobs:
  merge-weekly-pr:
    if: >
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'pull_request' &&
      startsWith(github.event.workflow_run.head_branch, 'rules/weekly-')
    runs-on: ubuntu-latest
    steps:
      - name: Merge weekly PR after CI
        env:
          GH_TOKEN: ${{ secrets.WEEKLY_MERGE_PAT }}
        run: |
          if [ -z "$GH_TOKEN" ]; then
            echo "::error::WEEKLY_MERGE_PAT secret が未設定です。docs/branch-protection.md を参照してください。"
            exit 1
          fi
          PR_NUMBER=$(gh api "repos/${{ github.repository }}/commits/${{ github.event.workflow_run.head_sha }}/pulls" --jq '.[0].number')
          if [ -z "$PR_NUMBER" ] || [ "$PR_NUMBER" = "null" ]; then
            echo "No PR found for ${{ github.event.workflow_run.head_branch }}"
            exit 1
          fi
          echo "Merging weekly PR #${PR_NUMBER} (${{ github.event.workflow_run.head_branch }})"
          gh pr merge "$PR_NUMBER" --merge --admin --delete-branch
